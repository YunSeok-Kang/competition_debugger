<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission Debugger Login</title>
  <style>
    :root {
      --bg: #f4efe7;
      --ink: #1f2a2e;
      --line: #d7cfc4;
      --card: #fffdf9;
      --accent: #0f766e;
      --muted: #5a6670;
      --danger: #9f1239;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% -10%, #fff6dd 0%, var(--bg) 45%), var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Noto Sans KR", sans-serif;
    }
    .card {
      width: min(420px, 92vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 12px 28px rgba(31, 42, 46, 0.1);
    }
    h2 { margin-top: 0; }
    .small { font-size: 12px; color: var(--muted); }
    label { display: block; font-size: 13px; margin-top: 10px; }
    input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      background: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }
    .err { margin-top: 10px; color: var(--danger); font-size: 13px; }
    code { background: #f8f5ef; padding: 1px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Submission Debugger 로그인</h2>
    <div class="small">발급받은 계정으로 로그인해 바로 검수 작업을 시작하세요.</div>
    <form method="post" action="/login">
      <input type="hidden" name="next_url" value="{{ next_url }}" />
      <label for="username">아이디</label>
      <input id="username" name="username" type="text" required autofocus />

      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">로그인</button>
      {% if error %}
      <div class="err">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</body>
</html>
